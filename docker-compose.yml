services:
  fastapi:
    container_name: ks-fastapi
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Postgres: Neon (managed). DB_SSL=require in prod.
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: ${DB_SSL:-require}
      # Embeddings: Voyage (managed).
      EMBED_BASE_URL: ${EMBED_BASE_URL:-https://api.voyageai.com/v1}
      EMBED_MODEL:    ${EMBED_MODEL:-voyage-3.5}
      EMBED_API_KEY:  ${EMBED_API_KEY}
      EMBED_DIM:      ${EMBED_DIM:-1024}
      # LLM + Whisper: Groq (managed).
      LLM_BASE_URL:   ${LLM_BASE_URL:-https://api.groq.com/openai/v1}
      LLM_MODEL:      ${LLM_MODEL:-llama-3.3-70b-versatile}
      LLM_API_KEY:    ${LLM_API_KEY}
      LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-120}
      DOCS_CHUNK_SIZE:     ${DOCS_CHUNK_SIZE:-800}
      DOCS_CHUNK_OVERLAP:  ${DOCS_CHUNK_OVERLAP:-100}
      DOCS_TOP_K:          ${DOCS_TOP_K:-5}
      MAX_AGENT_ITERATIONS: ${MAX_AGENT_ITERATIONS:-8}
      LOG_LEVEL:      ${LOG_LEVEL:-INFO}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      ENFORCE_INTERNAL_SECRET: ${ENFORCE_INTERNAL_SECRET:-True}
      STAGING_DIR: /staging
    volumes:
      - staging:/staging
    # Bound to localhost only; public traffic enters via Caddy on 80/443.
    ports:
      - "127.0.0.1:8000:8000"
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: ks-caddy
    depends_on:
      - fastapi
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  staging:
  caddy_data:
  caddy_config:
